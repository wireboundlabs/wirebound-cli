name: Release

on:
  push:
    tags:
      - 'v*'

# OIDC for npm trusted publishing
permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Do not set registry-url — it breaks OIDC when no NPM_TOKEN is present.
      # Node 24 bundles npm 11.5.1+, required for trusted publishing.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - run: npm publish --access public

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$(node -p "require('./package.json').version")" != "$VERSION" ]; then
            echo "::error::Tag v${VERSION} does not match package.json version"
            exit 1
          fi
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found=1
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section for version ${VERSION}"
            exit 1
          fi
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            {
              echo
              echo "**Full Changelog**: ${PREV_TAG}...${GITHUB_REF_NAME}"
            } >> release-notes.md
          fi

      - uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
