name: Release

on:
  push:
    tags:
      - 'v*'

# OIDC for npm trusted publishing
permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Do not set registry-url — it breaks OIDC when no NPM_TOKEN is present.
      # Node 24 bundles npm 11.5.1+, required for trusted publishing.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - run: npm publish --access public

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
